<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#172026">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Empire Time">
    <link rel="apple-touch-icon" href="/empire-formwork-logo.png">
    <title>Empire Formwork Time Tracker</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="center-shell">
      <section class="panel" style="width:min(620px, 100%)">
        <div class="brand">
          <div class="brand-mark"><img src="empire-formwork-logo.png" alt="Empire Formwork logo"></div>
          <div>
            <p class="brand-title">Empire Formwork</p>
            <p class="muted">Time tracking portal</p>
          </div>
        </div>
        <div>
          <p class="meta">Choose a portal</p>
          <h1 class="hero-title">Labor tracker</h1>
        </div>
        <div class="row">
          <a class="primary" href="/worker.html" style="display:grid;place-items:center;min-height:52px;border-radius:8px;text-decoration:none;font-weight:900">Worker Check In</a>
          <a href="/admin.html" style="display:grid;place-items:center;min-height:52px;border:1px solid var(--line);border-radius:8px;background:#fff;text-decoration:none;font-weight:900">Admin Access</a>
        </div>
      </section>
    </main>
  </body>
</html>
